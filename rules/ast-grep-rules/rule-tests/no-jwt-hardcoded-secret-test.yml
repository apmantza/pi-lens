id: no-jwt-hardcoded-secret
valid:
  - |
    import jwt
    token = jwt.encode(payload, secret, algorithm="HS256")
  - |
    import jwt
    SECRET = os.environ["JWT_SECRET"]
    token = jwt.encode(payload, SECRET, algorithm="HS256")
  - |
    import jwt
    token = jwt.encode({"user": "x"}, key=SECRET)
invalid:
  - |
    import jwt
    token = jwt.encode(payload, "hardcoded-secret-12345", algorithm="HS256")
  - |
    import jwt
    token = jwt.encode({"user": "x"}, key="my-secret-key")
