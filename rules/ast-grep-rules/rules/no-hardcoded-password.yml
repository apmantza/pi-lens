id: no-hardcoded-password
language: Python
message: "Passwords should not be hardcoded"
severity: error
note: |
  Port of SonarCloud python:S6437 (BLOCKER VULNERABILITY).

  Hardcoded passwords in source code end up in version control and
  build artifacts. Use environment variables, secrets managers, or
  configuration files outside the source tree.

  The rule matches any call that contains a `keyword_argument` named
  `password` (or `passwd`/`secret`) whose value is a string literal
  of length ≥ 6. The regex anchors to `^name="..."$` (not `="..."$`)
  because the literal text of the keyword_argument node includes
  the leading identifier name.
metadata:
  sonar: S6437
rule:
  any:
    - kind: call
      has:
        kind: keyword_argument
        regex: '^(password|passwd|secret)\s*=\s*"[^"]{6,}"$'
        stopBy: end
