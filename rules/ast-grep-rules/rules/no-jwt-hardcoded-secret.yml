id: no-jwt-hardcoded-secret
language: Python
message: "JWT secret keys should not be hardcoded"
severity: error
note: |
  Port of SonarCloud python:S6781 (BLOCKER VULNERABILITY).

  Hardcoded JWT secrets end up in source control, are easy to
  extract from compiled artifacts, and cannot be rotated without
  a code change. Use a secrets manager or environment variable
  and load the secret at runtime.

  The rule matches any call to `jwt.encode(...)` (or its variants
  `jwt.JWT().encode(...)`, `jose.jwt.encode(...)`, `pyjwt.encode(...)`)
  where one of the positional or keyword arguments is a string literal
  of suspicious length (≥ 8 chars) — likely a hardcoded secret.
metadata:
  sonar: S6781
rule:
  any:
    - all:
        - pattern: "jwt.encode($PAYLOAD, $SECRET, $$$REST)"
        - has:
            kind: string
            regex: '^"[A-Za-z0-9_\-]{8,}"$'
            stopBy: end
    - all:
        - pattern: "jwt.encode($$$ARGS, key=$S)"
        - has:
            kind: string
            regex: '^"[A-Za-z0-9_\-]{8,}"$'
            stopBy: end
